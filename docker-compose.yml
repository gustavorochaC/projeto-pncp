version: "3.9"

services:
  web:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --filter=web"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - api

  api:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --filter=api"
    ports:
      - "3001:3001"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - ollama

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

volumes:
  ollama:
